name: Deploy backend to production

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - 'build/**'
      - 'prod/**'
      - '.github/workflows/deploy-prod.yml'

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/andreyk55/postpilot-api:latest
  WORKER_IMAGE: ghcr.io/andreyk55/postpilot-worker:latest

jobs:
  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    environment: Production
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./build/Dockerfile
          target: api
          push: true
          tags: |
            ${{ env.API_IMAGE }}
            ghcr.io/andreyk55/postpilot-api:${{ github.sha }}
          cache-from: type=gha,scope=postpilot-api
          cache-to: type=gha,scope=postpilot-api,mode=max

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./build/Dockerfile
          target: publisher
          push: true
          tags: |
            ${{ env.WORKER_IMAGE }}
            ghcr.io/andreyk55/postpilot-worker:${{ github.sha }}
          cache-from: type=gha,scope=postpilot-worker
          cache-to: type=gha,scope=postpilot-worker,mode=max

  deploy:
    name: Deploy on VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Ensure /opt/postpilot exists on VPS
        run: |
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'mkdir -p /opt/postpilot/prod'

      - name: Copy prod/ to VPS
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes" \
            --exclude 'server.env' \
            ./prod/ \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/postpilot/prod/"

      - name: Login to GHCR on VPS, pull, and restart stack
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "GHCR_USERNAME='$GHCR_USERNAME' GHCR_TOKEN='$GHCR_TOKEN' bash -s" <<'REMOTE'
          set -euo pipefail
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          cd /opt/postpilot
          docker compose -f prod/docker-compose.yml pull
          docker compose -f prod/docker-compose.yml up -d
          docker compose -f prod/docker-compose.yml ps
          docker logout ghcr.io >/dev/null 2>&1 || true
          REMOTE

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_deploy
