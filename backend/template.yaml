AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Post Pilot - Social Media Scheduling Infrastructure

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Deployment environment

  DbConnectionString:
    Type: String
    NoEcho: true
    Description: PostgreSQL connection string

  MetaAppId:
    Type: String
    Description: Meta (Facebook) App ID

  MetaAppSecret:
    Type: String
    NoEcho: true
    Description: Meta (Facebook) App Secret

  VpcSubnetIds:
    Type: CommaDelimitedList
    Description: Subnet IDs for Lambda VPC access (for RDS)
    Default: ""

  VpcSecurityGroupIds:
    Type: CommaDelimitedList
    Description: Security Group IDs for Lambda VPC access
    Default: ""

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: dotnet8
    Architectures:
      - x86_64
    Environment:
      Variables:
        DB_CONNECTION_STRING: !Ref DbConnectionString
        META_APP_ID: !Ref MetaAppId
        META_APP_SECRET: !Ref MetaAppSecret

Conditions:
  HasVpcConfig: !Not [!Equals [!Join ["", !Ref VpcSubnetIds], ""]]

Resources:
  # ============================================
  # S3 Media Bucket
  # ============================================

  MediaBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub postpilot-media-${Environment}
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - "*"
            AllowedMethods:
              - PUT
              - GET
            AllowedOrigins:
              - "*"  # Restrict to your domain in production
            MaxAge: 3600
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ============================================
  # SQS Queues
  # ============================================

  PublishDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub postpilot-publish-dlq-${Environment}
      MessageRetentionPeriod: 1209600  # 14 days
      Tags:
        - Key: Environment
          Value: !Ref Environment

  PublishQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub postpilot-publish-queue-${Environment}.fifo
      FifoQueue: true
      ContentBasedDeduplication: false
      VisibilityTimeout: 180  # 3 minutes (6x Lambda timeout)
      MessageRetentionPeriod: 86400  # 1 day
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt PublishDeadLetterQueue.Arn
        maxReceiveCount: 3  # Move to DLQ after 3 failures
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ============================================
  # Lambda Functions
  # ============================================

  DispatcherFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub postpilot-dispatcher-${Environment}
      Handler: PostPilot.Api::PostPilot.Api.Lambdas.DispatcherFunction::FunctionHandler
      CodeUri: .
      Description: Polls database for due posts and sends to SQS
      Environment:
        Variables:
          SQS_QUEUE_URL: !Ref PublishQueue
      Policies:
        - SQSSendMessagePolicy:
            QueueName: !GetAtt PublishQueue.QueueName
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: '*'
      VpcConfig:
        !If
          - HasVpcConfig
          - SubnetIds: !Ref VpcSubnetIds
            SecurityGroupIds: !Ref VpcSecurityGroupIds
          - !Ref AWS::NoValue
      Events:
        ScheduleEvent:
          Type: Schedule
          Properties:
            Schedule: rate(1 minute)
            Name: !Sub postpilot-dispatcher-schedule-${Environment}
            Description: Triggers dispatcher every minute to check for due posts
            Enabled: true
      Tags:
        Environment: !Ref Environment

  StuckRecoveryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub postpilot-stuck-recovery-${Environment}
      Handler: PostPilot.Api::PostPilot.Api.Lambdas.StuckRecoveryFunction::FunctionHandler
      CodeUri: .
      Description: Recovers posts stuck in Publishing status for >10 minutes
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: '*'
      VpcConfig:
        !If
          - HasVpcConfig
          - SubnetIds: !Ref VpcSubnetIds
            SecurityGroupIds: !Ref VpcSecurityGroupIds
          - !Ref AWS::NoValue
      Events:
        ScheduleEvent:
          Type: Schedule
          Properties:
            Schedule: rate(5 minutes)
            Name: !Sub postpilot-stuck-recovery-schedule-${Environment}
            Description: Recovers stuck Publishing posts every 5 minutes
            Enabled: true
      Tags:
        Environment: !Ref Environment

  PublisherFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub postpilot-publisher-${Environment}
      Handler: PostPilot.Api::PostPilot.Api.Lambdas.PublisherFunction::FunctionHandler
      CodeUri: .
      Description: Publishes posts to social media platforms
      Timeout: 60  # Publishing can take longer
      Environment:
        Variables:
          MEDIA_BUCKET_NAME: !Ref MediaBucket
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource: !Sub ${MediaBucket.Arn}/*
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: '*'
      VpcConfig:
        !If
          - HasVpcConfig
          - SubnetIds: !Ref VpcSubnetIds
            SecurityGroupIds: !Ref VpcSecurityGroupIds
          - !Ref AWS::NoValue
      Events:
        SQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt PublishQueue.Arn
            BatchSize: 1  # Process one message at a time for reliability
            FunctionResponseTypes:
              - ReportBatchItemFailures
      Tags:
        Environment: !Ref Environment

  # ============================================
  # API Lambda (existing app)
  # ============================================

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub postpilot-api-${Environment}
      Handler: PostPilot.Api::PostPilot.Api.LambdaEntryPoint::FunctionHandlerAsync
      CodeUri: .
      Description: Post Pilot API - handles web requests
      Timeout: 30
      MemorySize: 1024
      Environment:
        Variables:
          SCHEDULER_TYPE: EventBridge
          PUBLISHER_LAMBDA_ARN: !GetAtt PublisherFunction.Arn
          SCHEDULER_ROLE_ARN: !GetAtt EventBridgeSchedulerRole.Arn
          EVENTBRIDGE_SCHEDULE_GROUP: !Sub postpilot-schedules-${Environment}
          MEDIA_BUCKET_NAME: !Ref MediaBucket
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - s3:PutObject
                - s3:GetObject
              Resource: !Sub ${MediaBucket.Arn}/*
            - Effect: Allow
              Action:
                - scheduler:CreateSchedule
                - scheduler:DeleteSchedule
                - scheduler:GetSchedule
                - scheduler:UpdateSchedule
              Resource: !Sub arn:aws:scheduler:${AWS::Region}:${AWS::AccountId}:schedule/postpilot-schedules-${Environment}/*
            - Effect: Allow
              Action:
                - iam:PassRole
              Resource: !GetAtt EventBridgeSchedulerRole.Arn
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: '*'
      VpcConfig:
        !If
          - HasVpcConfig
          - SubnetIds: !Ref VpcSubnetIds
            SecurityGroupIds: !Ref VpcSecurityGroupIds
          - !Ref AWS::NoValue
      Events:
        ApiGateway:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY
        ApiRoot:
          Type: HttpApi
          Properties:
            Path: /
            Method: ANY
      Tags:
        Environment: !Ref Environment

  # ============================================
  # EventBridge Schedule Group
  # ============================================

  ScheduleGroup:
    Type: AWS::Scheduler::ScheduleGroup
    Properties:
      Name: !Sub postpilot-schedules-${Environment}
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ============================================
  # IAM Roles
  # ============================================

  EventBridgeSchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub postpilot-scheduler-role-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokePublisherLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !GetAtt PublisherFunction.Arn

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/

  DispatcherFunctionArn:
    Description: Dispatcher Lambda ARN
    Value: !GetAtt DispatcherFunction.Arn

  PublisherFunctionArn:
    Description: Publisher Lambda ARN
    Value: !GetAtt PublisherFunction.Arn

  StuckRecoveryFunctionArn:
    Description: Stuck Recovery Lambda ARN
    Value: !GetAtt StuckRecoveryFunction.Arn

  PublishQueueUrl:
    Description: SQS Queue URL for publishing
    Value: !Ref PublishQueue

  PublishQueueArn:
    Description: SQS Queue ARN for publishing
    Value: !GetAtt PublishQueue.Arn

  DeadLetterQueueUrl:
    Description: Dead Letter Queue URL
    Value: !Ref PublishDeadLetterQueue

  ScheduleGroupName:
    Description: EventBridge Schedule Group name
    Value: !Ref ScheduleGroup

  EventBridgeSchedulerRoleArn:
    Description: IAM Role ARN for EventBridge Scheduler
    Value: !GetAtt EventBridgeSchedulerRole.Arn

  MediaBucketName:
    Description: S3 bucket for media uploads
    Value: !Ref MediaBucket

  MediaBucketArn:
    Description: S3 bucket ARN for media uploads
    Value: !GetAtt MediaBucket.Arn
