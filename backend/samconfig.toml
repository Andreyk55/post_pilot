# SAM CLI configuration file
# Run `sam deploy --guided` for first-time setup

version = 0.1

[default]
[default.global.parameters]
stack_name = "postpilot-stack"

[default.build.parameters]
cached = true
parallel = true

[default.validate.parameters]
lint = true

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM CAPABILITY_NAMED_IAM"
confirm_changeset = true
resolve_s3 = true
fail_on_empty_changeset = false

# Environment-specific configurations

[dev]
[dev.deploy.parameters]
stack_name = "postpilot-dev"
parameter_overrides = "Environment=dev"
tags = "Environment=dev Project=PostPilot"

[staging]
[staging.deploy.parameters]
stack_name = "postpilot-staging"
parameter_overrides = "Environment=staging"
tags = "Environment=staging Project=PostPilot"

[prod]
[prod.deploy.parameters]
stack_name = "postpilot-prod"
parameter_overrides = "Environment=prod"
confirm_changeset = true
tags = "Environment=prod Project=PostPilot"
