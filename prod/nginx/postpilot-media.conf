# ────────────────────────────────────────────────────────────────────────────
# PostPilot — host nginx config for https://media.cloud-ip.cc
#
# Reverse-proxies the public HTTPS hostname to the MinIO container bound
# to 127.0.0.1:9000 by prod/docker-compose.yml. S3 signature v4 binds the
# presigned URL to the exact host MinIO sees, so MINIO_SERVER_URL in
# docker-compose.yml must be https://media.cloud-ip.cc to match this.
#
# Install on the VPS as:
#   /etc/nginx/sites-available/postpilot-media.conf
#   /etc/nginx/sites-enabled/postpilot-media.conf  (symlink)
#
# Issue the cert (one-time):
#   sudo certbot --nginx -d media.cloud-ip.cc
#
# Then:
#   sudo nginx -t && sudo systemctl reload nginx
# ────────────────────────────────────────────────────────────────────────────

# Redirect plain HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name media.cloud-ip.cc;

    # ACME http-01 challenge (Certbot writes here during renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS termination + reverse proxy to the MinIO container (127.0.0.1:9000)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name media.cloud-ip.cc;

    ssl_certificate     /etc/letsencrypt/live/media.cloud-ip.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/media.cloud-ip.cc/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Match the API's RequestSizeLimit (250MB) so video uploads aren't
    # cut off at the proxy before they reach MinIO.
    client_max_body_size 250m;

    # Stream the upload body straight to MinIO instead of buffering the
    # whole file to nginx's disk. Required for large videos and for
    # progress reporting on the browser side to be meaningful.
    proxy_request_buffering off;
    proxy_buffering         off;
    proxy_http_version      1.1;

    # MinIO does long uploads — bump from nginx's defaults so a slow
    # client doesn't trip a timeout mid-upload.
    proxy_read_timeout      600s;
    proxy_send_timeout      600s;
    proxy_connect_timeout   10s;

    # MinIO has its own CORS handling driven by MINIO_API_CORS_ALLOW_ORIGIN
    # in docker-compose.yml — don't add nginx-level CORS headers here or
    # they'll be duplicated on the response and break the browser preflight.

    location / {
        proxy_pass http://127.0.0.1:9000;

        # Preserve the host MinIO signed against. If $host doesn't equal
        # media.cloud-ip.cc the signature check will fail with SignatureDoesNotMatch.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
