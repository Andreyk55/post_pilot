# ────────────────────────────────────────────────────────────────────────────
# PostPilot — host nginx config for https://post-pilot.cloud-ip.cc
#
# Install on the VPS as:
#   /etc/nginx/sites-available/postpilot-api.conf
#   /etc/nginx/sites-enabled/postpilot-api.conf  (symlink)
#
# Then:
#   sudo nginx -t && sudo systemctl reload nginx
#
# Assumes Certbot has already issued a certificate:
#   sudo certbot --nginx -d post-pilot.cloud-ip.cc
# (or use --standalone if you prefer; the cert paths below are the standard
#  Let's Encrypt layout either way)
# ────────────────────────────────────────────────────────────────────────────

# Redirect plain HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name post-pilot.cloud-ip.cc;

    # ACME http-01 challenge (Certbot writes here during renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS termination + reverse proxy to the API container (127.0.0.1:5122)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name post-pilot.cloud-ip.cc;

    ssl_certificate     /etc/letsencrypt/live/post-pilot.cloud-ip.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/post-pilot.cloud-ip.cc/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # The Vercel frontend may upload media; bump from nginx's 1m default.
    client_max_body_size 100m;

    # Keep upstream connections alive — the API runs migrations on cold
    # start, so the first request after a deploy can take a few seconds.
    proxy_read_timeout    120s;
    proxy_send_timeout    120s;
    proxy_connect_timeout 10s;

    location / {
        proxy_pass http://127.0.0.1:5122;

        # Preserve the original request metadata so ASP.NET Core's
        # ForwardedHeaders middleware can reconstruct Request.Scheme/Host.
        # See backend/Startup.cs Configure() — XForwardedFor + XForwardedProto.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_http_version 1.1;
    }
}
