# ────────────────────────────────────────────────────────────────────────────
# PostPilot — production stack for the Hetzner VPS.
#
# Layout:
#   - Host nginx (NOT in this file) terminates HTTPS for
#     https://post-pilot.cloud-ip.cc and reverse-proxies to 127.0.0.1:5122.
#     Template config: prod/nginx/postpilot-api.conf
#   - The API container binds 5122 on 127.0.0.1 only — NEVER on 0.0.0.0.
#   - Postgres has NO host port published, so it is unreachable from the
#     public internet. API/Worker reach it over the compose network via the
#     service name `postpilot-postgres` (only when --profile localdb is used).
#   - Frontend is hosted separately on Vercel
#     (https://post-auto-pilot.vercel.app) and is NOT in this file.
#
# Media storage:
#   Media is stored in Supabase Storage (private bucket). The API and Worker
#   sign short-lived upload/download URLs at request time — bytes go directly
#   between the browser/Meta and Supabase, never through this VPS. MinIO is
#   no longer part of the production stack.
#
# Usage on the VPS:
#   sudo mkdir -p /opt/postpilot
#   # copy this compose file to /opt/postpilot/prod/docker-compose.yml
#   # copy prod/server.supabase.env.example to /opt/postpilot/server.env
#   # and fill it in (Supabase DB + Supabase Storage)
#   cd /opt/postpilot
#   docker compose -f prod/docker-compose.yml pull
#   docker compose -f prod/docker-compose.yml up -d
#
# Images are pulled from GHCR, built and pushed by GitHub Actions
# (.github/workflows/deploy-prod.yml). Override via env if needed:
#   API_IMAGE / WORKER_IMAGE
# ────────────────────────────────────────────────────────────────────────────

services:
  # Local Docker Postgres — only runs under the `localdb` compose profile.
  # Default deployment uses Supabase Postgres (see prod/server.supabase.env.example),
  # in which case this container is not started. To run with local Postgres
  # instead, start the stack with `--profile localdb` AND set
  # ConnectionStrings__DefaultConnection in server.env to point at
  # Host=postpilot-postgres.
  postpilot-postgres:
    image: postgres:16
    container_name: postpilot-postgres
    profiles: ["localdb"]
    # No `ports:` block on purpose — Postgres is reachable only over the
    # compose network. If you need psql/pg_dump from the VPS shell, exec
    # into the container or bind to 127.0.0.1 here (never 0.0.0.0).
    env_file:
      - /opt/postpilot/server.env
    volumes:
      - postpilot-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  postpilot-api:
    image: ${API_IMAGE:-ghcr.io/andreyk55/postpilot-api:latest}
    container_name: postpilot-api
    env_file:
      - /opt/postpilot/server.env
    # Bind ONLY to the loopback interface. The host nginx talks to this
    # over 127.0.0.1; the public internet cannot reach 5122 directly.
    ports:
      - "127.0.0.1:5122:5122"
    # No `depends_on: postpilot-postgres` — the DB might be Supabase (out
    # of compose) instead of the local container. If you use --profile localdb,
    # the API will still wait on its own connect+migrate retries on startup.
    # No `depends_on: postpilot-minio*` either — MinIO has been removed; media
    # lives in Supabase Storage, which the API talks to over the public internet.
    restart: unless-stopped

  postpilot-worker:
    image: ${WORKER_IMAGE:-ghcr.io/andreyk55/postpilot-worker:latest}
    container_name: postpilot-worker
    env_file:
      - /opt/postpilot/server.env
    # No `ports:` — the worker is a background process. It also does NOT
    # run EF Core migrations; the API container is the single migrator
    # (see backend/Program.cs vs backend/publisher/Program.cs).
    depends_on:
      postpilot-api:
        condition: service_started
    restart: unless-stopped

  # ── MinIO services removed (2026-05-29) ────────────────────────────────
  # PostPilot now uses Supabase Storage. The previous postpilot-minio and
  # postpilot-minio-init services are intentionally deleted; the bucket
  # bootstrap is no longer needed (the Supabase bucket `postpilot-media`
  # is created once in the Supabase dashboard).
  #
  # If you need to roll back to MinIO temporarily, restore those services
  # from git history (commit before this change) and set
  # MediaStorage__Provider=s3-compatible in server.env. The provider
  # selection is already config-driven; no code change is required.

# Only postgres data is volume-backed now (and only under the localdb profile).
# The MinIO volume (postpilot-minio-data) has been removed from this file but
# the named volume on the VPS is NOT auto-deleted by docker compose. To free
# the disk after a successful Supabase migration, manually run:
#   docker volume rm postpilot_postpilot-minio-data    # one-time, irreversible
volumes:
  postpilot-postgres-data:
