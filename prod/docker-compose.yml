# ────────────────────────────────────────────────────────────────────────────
# PostPilot — production stack for the Hetzner VPS.
#
# Layout:
#   - Host nginx (NOT in this file) terminates HTTPS for
#     https://post-pilot.cloud-ip.cc and reverse-proxies to 127.0.0.1:5122.
#     Template config: prod/nginx/postpilot-api.conf
#   - The API container binds 5122 on 127.0.0.1 only — NEVER on 0.0.0.0.
#   - Postgres has NO host port published, so it is unreachable from the
#     public internet. API/Worker reach it over the compose network via the
#     service name `postpilot-postgres`.
#   - Frontend is hosted separately on Vercel
#     (https://post-auto-pilot.vercel.app) and is NOT in this file.
#
# Usage on the VPS:
#   sudo mkdir -p /opt/postpilot
#   # copy this compose file to /opt/postpilot/prod/docker-compose.yml
#   # copy either server.local.env.example or server.supabase.env.example
#   # to /opt/postpilot/server.env, then fill it in
#   cd /opt/postpilot
#   docker compose -f prod/docker-compose.yml pull
#   docker compose -f prod/docker-compose.yml up -d
#
# Images are pulled from GHCR, built and pushed by GitHub Actions
# (.github/workflows/deploy-prod.yml). Override via env if needed:
#   API_IMAGE / WORKER_IMAGE
# ────────────────────────────────────────────────────────────────────────────

services:
  # Local Docker Postgres — only runs under the `localdb` compose profile.
  # Default deployment uses Supabase (see prod/server.supabase.env.example), in
  # which case this container is not started. To run with local Postgres
  # instead, start the stack with `--profile localdb` AND set
  # ConnectionStrings__DefaultConnection in server.env to point at
  # Host=postpilot-postgres.
  postpilot-postgres:
    image: postgres:16
    container_name: postpilot-postgres
    profiles: ["localdb"]
    # No `ports:` block on purpose — Postgres is reachable only over the
    # compose network. If you need psql/pg_dump from the VPS shell, exec
    # into the container or bind to 127.0.0.1 here (never 0.0.0.0).
    env_file:
      - /opt/postpilot/server.env
    volumes:
      - postpilot-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  postpilot-api:
    image: ${API_IMAGE:-ghcr.io/andreyk55/postpilot-api:latest}
    container_name: postpilot-api
    env_file:
      - /opt/postpilot/server.env
    # Bind ONLY to the loopback interface. The host nginx talks to this
    # over 127.0.0.1; the public internet cannot reach 5122 directly.
    ports:
      - "127.0.0.1:5122:5122"
    # No `depends_on: postpilot-postgres` — the DB might be Supabase (out
    # of compose) instead of the local container. If you use --profile localdb,
    # the API will still wait on its own connect+migrate retries on startup.
    depends_on:
      postpilot-minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  postpilot-worker:
    image: ${WORKER_IMAGE:-ghcr.io/andreyk55/postpilot-worker:latest}
    container_name: postpilot-worker
    env_file:
      - /opt/postpilot/server.env
    # No `ports:` — the worker is a background process. It also does NOT
    # run EF Core migrations; the API container is the single migrator
    # (see backend/Program.cs vs backend/publisher/Program.cs).
    depends_on:
      postpilot-api:
        condition: service_started
      postpilot-minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Object storage (MinIO, S3-compatible) ────────────────────────────────
  # Server mode hands presigned PUT URLs to the browser; bytes land here.
  # S3 signature v4 binds the signature to the host the URL is signed for,
  # so MINIO_SERVER_URL must match what the browser actually hits — i.e.
  # the public HTTPS hostname terminated by the host nginx
  # (prod/nginx/postpilot-media.conf reverse-proxies to 127.0.0.1:9000).
  postpilot-minio:
    # Pinned: `latest` could land an incompatible MinIO during a prod pull.
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: postpilot-minio
    env_file:
      - /opt/postpilot/server.env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # What MinIO advertises in console redirects and signs presigned URLs
      # against. Must equal the public host the browser reaches it on.
      MINIO_SERVER_URL: https://media.post-pilot.cloud-ip.cc
      MINIO_BROWSER_REDIRECT_URL: https://media.post-pilot.cloud-ip.cc
      # CORS for browser PUTs from the Vercel frontend. Without this the
      # preflight on the presigned URL fails before the upload starts.
      MINIO_API_CORS_ALLOW_ORIGIN: "https://post-auto-pilot.vercel.app"
    command: server /data --console-address ":9001"
    ports:
      # S3 API and console BOTH bound to loopback only. The public internet
      # reaches MinIO only through nginx on media.post-pilot.cloud-ip.cc → 127.0.0.1:9000.
      # Console (9001) is intentionally NOT proxied; use `ssh -L 9001:127.0.0.1:9001`
      # to reach it.
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - postpilot-minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  # One-shot bucket bootstrap. Idempotent — `mc mb --ignore-existing` is a
  # no-op on subsequent runs. API/Worker `depends_on` this with
  # `service_completed_successfully` so they only start once the bucket
  # exists.
  postpilot-minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: postpilot-minio-init
    env_file:
      - /opt/postpilot/server.env
    depends_on:
      postpilot-minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
      mc alias set local http://postpilot-minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/$$MEDIA_STORAGE_BUCKET &&
      echo 'bucket ready: '$$MEDIA_STORAGE_BUCKET
      "
    restart: "no"

volumes:
  postpilot-postgres-data:
  postpilot-minio-data:
