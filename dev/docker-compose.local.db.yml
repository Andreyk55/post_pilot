services:
  postgres:
    image: postgres:16
    container_name: postpilot-db
    env_file:
      - ${ENV_FILE:-./local.env}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  pgadmin:
    image: dpage/pgadmin4
    container_name: postpilot-pgadmin
    env_file:
      - ${ENV_FILE:-./local.env}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    restart: unless-stopped

  # Extend api/publisher (defined in docker-compose.yml) so they wait for postgres
  # to be healthy before starting. Without this they race the DB on cold boot.
  api:
    depends_on:
      postgres:
        condition: service_healthy

  publisher:
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started

volumes:
  postgres_data:
