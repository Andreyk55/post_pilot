services:
  postgres:
    image: postgres:16
    container_name: postpilot-db
    env_file:
      - ${ENV_FILE:-./local.env}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  pgadmin:
    image: dpage/pgadmin4
    container_name: postpilot-pgadmin
    env_file:
      - ${ENV_FILE:-./local.env}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    restart: unless-stopped

# api/publisher depends_on overrides live in docker-compose.local.depends.yml
# so this file can be loaded on its own (e.g. for pgadmin-only startup).

volumes:
  postgres_data:
