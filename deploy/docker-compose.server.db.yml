services:
  postgres:
    image: postgres:16
    container_name: postpilot-db
    env_file:
      - ${ENV_FILE:-env/server.env}
    # No host port published by default — only the api/publisher containers
    # talk to Postgres, over the compose network. Uncomment if you need to
    # reach the DB from the VPS host (e.g. psql, pg_dump) and bind to 127.0.0.1
    # so it is NOT exposed publicly.
    # ports:
    #   - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    depends_on:
      postgres:
        condition: service_healthy

  publisher:
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started

volumes:
  postgres_data:
