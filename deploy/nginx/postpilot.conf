# Post Pilot — nginx reverse proxy for the VPS deployment.
#
# Routes (all over plain HTTP on :80 for now):
#   /                 → api:5122        (ASP.NET Core API + Swagger)
#   /storage/         → minio:9000      (S3 API — used by browser presigned uploads)
#   /storage-console/ → minio:9001      (MinIO web UI; consider removing in prod)
#
# Why proxy MinIO instead of exposing :9000 directly:
#   - one port (80) open on the firewall
#   - presigned upload URLs need the SAME host/scheme the browser uses, so MinIO
#     must be reached via the same public origin as the API
#
# To enable HTTPS later:
#   1. Put fullchain.pem + privkey.pem into deploy/nginx/certs/
#   2. Uncomment the `server { listen 443 ssl ... }` block below
#   3. Change `MediaStorage__UseSSL` to true and switch the public endpoints
#      in server.env from http:// to https://

# Large request bodies for media uploads (images/videos go through /storage).
client_max_body_size 200m;

# Buffer tuning so MinIO streaming responses (presigned PUT, large GET) don't
# stall — nginx default buffer sizes are too small for video uploads.
proxy_buffering off;
proxy_request_buffering off;

server {
    listen 80 default_server;
    server_name _;

    # ── API + Swagger ──────────────────────────────────────────────────────
    location / {
        proxy_pass http://api:5122;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout 120s;
    }

    # ── MinIO S3 API (presigned uploads + downloads) ───────────────────────
    # Strip /storage/ before forwarding so MinIO sees "/<bucket>/<key>".
    location /storage/ {
        rewrite ^/storage/(.*)$ /$1 break;
        proxy_pass http://minio:9000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # MinIO signs requests against the Host header it receives; passing the
        # public host keeps presigned URLs validating correctly.
        proxy_connect_timeout 60s;
        proxy_read_timeout   600s;
        proxy_send_timeout   600s;
    }

    # ── MinIO web console (optional — comment out for tighter prod) ────────
    location /storage-console/ {
        rewrite ^/storage-console/(.*)$ /$1 break;
        proxy_pass http://minio:9001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # MinIO console uses websockets for live updates.
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}

