services:
  postgres:
    image: postgres:16
    container_name: postpilot-db
    env_file:
      - ${ENV_FILE:-env/local.env}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: postpilot-pgadmin
    env_file:
      - ${ENV_FILE:-env/local.env}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
