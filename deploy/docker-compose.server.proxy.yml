services:
  nginx:
    image: nginx:1.27-alpine
    container_name: postpilot-nginx
    depends_on:
      - api
      - minio
    ports:
      - "80:80"
      # TLS port left here so adding a cert later is just dropping files into
      # ./nginx/certs/ and uncommenting the 443 server block in postpilot.conf.
      - "443:443"
    volumes:
      - ./nginx/postpilot.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    restart: unless-stopped
